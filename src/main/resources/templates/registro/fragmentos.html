<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:replace="~{/layout/plantilla :: head}">
    <title>TechShop</title>
</head>

<body>

<!-- Fragmento que se utiliza en la página para registrar -->
<section th:fragment="nuevoUsuario">

    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <section>
                <div class="col-md-4 d-grid">
                    <a th:href="@{/login}" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i>
                        [[#{accion.regresar}]]
                    </a>
                </div>
            </section>
        </div>
    </div>

    <div class="row py-2 justify-content-center">
        <div class="col-md-3">
            <form method="POST"
                  th:action="@{/registro/crearUsuario}"
                  th:object="${usuario}"
                  class="was-validated">

                <div class="card">

                    <div class="card-header">
                        <h4>[[#{usuario.agregar}]]</h4>
                    </div>

                    <div class="card-body">

                        <div class="mb-3">
                            <label>[[#{usuario.username}]]</label>
                            <input type="text" class="form-control"
                                   name="username" maxlength="30"
                                   th:field="*{username}"/>
                        </div>

                        <div class="mb-3">
                            <label>[[#{usuario.nombre}]]</label>
                            <input type="text" class="form-control"
                                   name="nombre" maxlength="20"
                                   th:field="*{nombre}"/>
                        </div>

                        <div class="mb-3">
                            <label>[[#{usuario.apellidos}]]</label>
                            <input type="text" class="form-control"
                                   name="apellidos" maxlength="30"
                                   th:field="*{apellidos}"/>
                        </div>

                        <div class="mb-3">
                            <label>[[#{usuario.correo}]]</label>
                            <input type="email" class="form-control"
                                   name="correo" maxlength="75"
                                   th:field="*{correo}" required/>
                        </div>

                    </div>

                    <div class="card-footer text-end">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-envelope"></i>
                            [[#{usuario.activacion}]]
                        </button>
                    </div>

                </div>

            </form>
        </div>
    </div>

</section>

</body>
</html>
