<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <!-- ================================== -->
        <!-- Fragmento 1: Tabs de categorías -->
        <!-- ================================== -->
        <section th:fragment="tabs" class="py-3 mb-4">
            <div class="d-flex justify-content-center px-5">

                <ul class="nav nav-underline">

                    <!-- Todas -->
                    <li class="nav-item">
                        <a th:href="@{/}"
                           th:classappend="${idCategoriaActual == null} ? 'active'"
                           class="nav-link"
                           aria-current="page">
                            [[#{pruebas.todas}]]
                        </a>
                    </li>

                    <!-- Categorías -->
                    <li th:each="c : ${categorias}" class="nav-item">
                        <a th:href="@{/consultas/{id}(id=${c.idCategoria})}"
                           th:classappend="${idCategoriaActual != null and idCategoriaActual.equals(c.idCategoria)} ? 'active'"
                           class="nav-link">
                            [[${c.descripcion}]]
                        </a>
                    </li>

                </ul>

            </div>
        </section>


        <!-- ================================== -->
        <!-- Fragmento 2: Tarjetas de productos -->
        <!-- ================================== -->
        <section th:fragment="tarjetas" class="py-4">

            <div class="container">
                <div class="row g-4">

                    <section th:fragment="tarjetas" class="py-4">
                        <div class="container">
                            <div class="row g-4">

                                <div class="col-md-3" th:each="p : ${productos}">
                                    <div class="card h-100 shadow-sm">

                                        <!-- Imagen -->
                                        <img th:if="${p.rutaImagen != null and !#strings.isEmpty(p.rutaImagen)}"
                                             th:src="@{${p.rutaImagen}}"
                                             class="card-img-top"
                                             alt="Producto">

                                            <div class="card-body text-center">

                                                <!-- Nombre -->
                                                <h5 class="card-title mb-2">
                                                    [[${p.descripcion}]]
                                                </h5>

                                                <!-- Precio -->
                                                <p class="card-text fw-bold mb-2">
                                                    ₡[[${#numbers.formatDecimal(p.precio, 1, 'COMMA', 2, 'POINT')}]]
                                                </p>

                                                <!-- Categoría -->
                                                <p class="text-muted small mb-2">
                                                    [[${p.categoria.descripcion}]]
                                                </p>

                                                <!-- ✅ Descripción / detalle del producto -->
                                                <p class="text-muted small mb-3 text-truncate"
                                                   style="max-width: 100%;"
                                                   th:text="${p.detalle}">
                                                </p>

                                                <!-- ✅ Disponibles / existencias -->
                                                <span class="badge text-bg-success"
                                                      th:if="${p.existencias != null and p.existencias > 0}"
                                                      th:text="${p.existencias} + ' unidades'">
                                                </span>

                                                <span class="badge text-bg-danger"
                                                      th:unless="${p.existencias != null and p.existencias > 0}">
                                                    Agotado
                                                </span>

                                            </div>

                                            <div class="card-footer text-center">
                                                <button class="btn btn-primary" th:disabled="${p.existencias == null or p.existencias == 0}">
                                                    <i class="fa-solid fa-cart-shopping"></i>
                                                </button>
                                            </div>

                                    </div>
                                </div>

                            </div>
                        </div>
                    </section>
